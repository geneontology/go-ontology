name: Refresh Rhea relationships TSV

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:${{ vars.ODK_VERSION }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Refresh Rhea relationships TSV
        run: cd src/ontology && rm ../resources/rhea-relationships.tsv && make ../resources/rhea-relationships.tsv && cd ../..

      - name: Set up scala-cli
        uses: VirtusLab/scala-cli-setup@v1

      - name: Add child RHEA narrow xrefs to go-edit.obo
        run: cd src/ontology && scala-cli ../util/add_rhea_child_narrow_xrefs.sc -- --inPlace true && cd ../..

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: Refresh Rhea relationships TSV and add missing child xrefs
          branch: refresh-rhea-relationships
          add-paths: |
            src/resources/rhea-relationships.tsv
            src/ontology/go-edit.obo
          token: ${{ secrets.PR_ACTION_TOKEN }}
